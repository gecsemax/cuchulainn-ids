<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CuChulainn IDS</title>
  <desc id="desc">Minimal dark badge logo for CuChulainn IDS</desc>

  <!-- Full dark background so it looks the same in light/dark themes -->
  <rect x="0" y="0" width="420" height="120" rx="18" ry="18" fill="#020617"/>

  <!-- Left icon: very simple shield + spear -->
  <g transform="translate(28,20)">
    <!-- Shield outline -->
    <path d="
      M32 6
      L68 12
      L68 44
      C68 58, 52 70, 32 78
      C12 70, -4 58, -4 44
      L-4 12
      Z"
      fill="none"
      stroke="#22d3ee"
      stroke-width="2"/>

    <!-- Inner shield line -->
    <path d="
      M24 16
      L56 20
      L56 42
      C56 51, 46 60, 32 66
      C18 60, 8 51, 8 42
      L8 20
      Z"
      fill="none"
      stroke="#4ade80"
      stroke-width="1.4"/>

    <!-- Spear -->
    <line x1="2" y1="64" x2="66" y2="26"
          stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
    <polygon points="66,26 60,22 72,20"
             fill="#22d3ee"/>
  </g>

  <!-- Text block -->
  <g transform="translate(150,46)">
    <text x="0" y="0"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="30"
          letter-spacing="1.2"
          fill="#e5e7eb">
      CuChulainn
    </text>

    <text x="0" y="26"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14"
          letter-spacing="4"
          fill="#6b7280">
      IDS
    </text>
  </g>
</svg>
