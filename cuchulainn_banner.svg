<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CuChulainn IDS</title>
  <desc id="desc">Stylized logo banner for the CuChulainn intrusion detection system</desc>

  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#050816"/>
      <stop offset="40%" stop-color="#0a1930"/>
      <stop offset="100%" stop-color="#1b365d"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#31d7ff"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded border -->
  <rect x="2" y="2" width="416" height="116" rx="16" ry="16"
        fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="3"/>

  <!-- Subtle grid for cyber feel -->
  <g stroke="#1d3557" stroke-width="0.3" opacity="0.35">
    <line x1="40" y1="20" x2="40" y2="100"/>
    <line x1="80" y1="20" x2="80" y2="100"/>
    <line x1="120" y1="20" x2="120" y2="100"/>
    <line x1="160" y1="20" x2="160" y2="100"/>
    <line x1="200" y1="20" x2="200" y2="100"/>
    <line x1="240" y1="20" x2="240" y2="100"/>
    <line x1="280" y1="20" x2="280" y2="100"/>
    <line x1="320" y1="20" x2="320" y2="100"/>
    <line x1="360" y1="20" x2="360" y2="100"/>

    <line x1="20" y1="30" x2="400" y2="30"/>
    <line x1="20" y1="50" x2="400" y2="50"/>
    <line x1="20" y1="70" x2="400" y2="70"/>
    <line x1="20" y1="90" x2="400" y2="90"/>
  </g>

  <!-- Shield emblem (symbolizing defense/guardian) -->
  <g transform="translate(32,20)" filter="url(#glow)">
    <!-- Outer shield -->
    <path d="M32 0 L64 10 L64 42 C64 57 49 72 32 80 C15 72 0 57 0 42 L0 10 Z"
          fill="url(#shieldGrad)" stroke="#31d7ff" stroke-width="2"/>

    <!-- Inner knot-like mark (CuChulainn / Celtic hint) -->
    <path d="M18 22
             C18 14, 26 12, 32 16
             C38 12, 46 14, 46 22
             C46 30, 38 34, 32 38
             C26 34, 18 30, 18 22 Z"
          fill="none" stroke="#7cf3ff" stroke-width="2.1"/>

    <!-- Spear motif (attack detection) -->
    <line x1="8" y1="56" x2="56" y2="20"
          stroke="#ffcc33" stroke-width="2.4" stroke-linecap="round"/>
    <polygon points="56,20 52,16 62,14"
             fill="#ffcc33"/>
  </g>

  <!-- Project title -->
  <text x="150" y="52"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30"
        letter-spacing="1.5"
        fill="#f5f7ff">
    CuChulainn
  </text>

  <!-- IDS label -->
  <rect x="150" y="64" rx="6" ry="6" width="92" height="24"
        fill="none" stroke="#31d7ff" stroke-width="1.4"/>
  <text x="196" y="81"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14"
        text-anchor="middle"
        fill="#9bdcff">
    INTRUSION IDS
  </text>

  <!-- Tagline -->
  <text x="150" y="104"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11"
        fill="#9aa6d6">
    Guardian of the perimeter · Detect, defend, deter
  </text>

  <!-- Small animated scanning line for subtle motion (works in GitHub READMEs) -->
  <rect x="2" y="2" width="416" height="116" rx="16" ry="16"
        fill="none" stroke="#31d7ff" stroke-width="1" opacity="0.0">
    <animate attributeName="opacity"
             values="0;0.45;0"
             dur="3.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>
